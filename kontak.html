<!DOCTYPE html>
<html>
<head>
    <title>Kontak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .contact-container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .contact-container h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            font-size: 16px;
            color: #34495e;
        }

        .contact-item span {
            width: 90px;
            font-weight: bold;
            text-align: right;
            margin-right: 10px;
        }

        .contact-item i {
            margin-right: 8px;
            color: #2c3e50;
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background-color: #34495e;
        }
    </style>
    <!-- Optional: gunakan font awesome untuk ikon -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="contact-container">
    <h2>Kontak Kami</h2>

    <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <span>Email:</span> actual_smd@yahoo.co.id
    </div>

    <div class="contact-item">
        <i class="fas fa-phone"></i>
        <span>Telepon:</span> 085117385005
    </div>

    <div class="contact-item">
        <i class="fab fa-instagram"></i>
        <span>Instagram:</span> @lpkma_actual
    </div>

    <a href="index.html" class="btn-back">⬅ Kembali ke Beranda</a>
</div>

</body>
</html>
