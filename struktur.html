<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Halaman Foto</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
}

.container{
    background:#f5f5f5;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

/* ukuran foto lebih lebar */
.container img{
    width:55vw;
    max-width:800px;
    height:auto;
    border-radius:10px;
    margin-bottom:25px;
}

/* tombol */
.btn{
    text-decoration:none;
    background:#2f6fed;
    color:white;
    padding:12px 30px;
    border-radius:10px;
    font-size:16px;
    transition:0.3s;
}

.btn:hover{
    background:#1e4fc7;
}
</style>

</head>
<body>

<div class="container">
    <img src="strukturlpkma.jpeg" alt="Struktur Organisasi">
    <br>
    <a href="index.html" class="btn">Kembali ke Beranda</a>
</div>

</body>
</html>
